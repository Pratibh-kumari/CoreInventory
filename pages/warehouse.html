<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoreInventory — Warehouse & Location</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:#0a0f2e;color:#fff;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}

    .navbar{position:fixed;top:0;left:0;right:0;height:56px;background:#111936;border-bottom:1px solid #1e2d5a;display:flex;align-items:center;justify-content:space-between;padding:0 32px;z-index:1000}
    .nav-links{display:flex;align-items:center;gap:28px;list-style:none}
    .nav-links li{position:relative}
    .nav-links a,.nav-links .nav-btn{background:none;border:none;height:56px;display:flex;align-items:center;gap:4px;color:#a0aec0;text-decoration:none;cursor:pointer;font-size:14px;font-family:inherit;border-bottom:2px solid transparent;transition:.15s}
    .nav-links a:hover,.nav-links .nav-btn:hover{color:#fff}
    .nav-links li.active>a,.nav-links li.active>.nav-btn{color:#fff;border-bottom-color:#2563eb}
    .arrow{font-size:10px;opacity:.7;transition:transform .2s}
    .nav-links li:hover .arrow,.nav-links li.open .arrow{transform:rotate(180deg)}
    .dropdown{display:none;position:absolute;left:0;top:calc(100% + 1px);min-width:160px;background:#1a2347;border:1px solid #1e2d5a;border-radius:8px;padding:8px 0;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:200}
    .nav-links li:hover .dropdown,.nav-links li.open .dropdown{display:block}
    .dropdown a{display:block;padding:10px 16px;color:#a0aec0;text-decoration:none;font-size:13px}
    .dropdown a:hover{background:#2563eb;color:#fff}
    .nav-right{display:flex;align-items:center;gap:12px;position:relative}
    .nav-title{font-size:15px;font-weight:700}
    .avatar{width:34px;height:34px;border-radius:50%;border:0;background:#2563eb;color:#fff;font-size:13px;font-weight:700;cursor:pointer}
    .avatar-menu{display:none;position:absolute;right:0;top:calc(100% + 10px);min-width:150px;background:#1a2347;border:1px solid #1e2d5a;border-radius:8px;padding:8px 0;z-index:300}
    .avatar-menu.open{display:block}
    .avatar-menu a,.avatar-menu button{display:block;width:100%;padding:10px 16px;color:#a0aec0;background:none;border:none;text-decoration:none;text-align:left;cursor:pointer;font-size:13px}
    .avatar-menu a:hover,.avatar-menu button:hover{background:#2563eb;color:#fff}

    .main{margin-top:56px;padding:32px;display:grid;grid-template-columns:1fr 1fr;gap:24px}
    .card{background:#111936;border:1px solid #1e2d5a;border-radius:10px;padding:24px}
    .title{font-size:18px;font-weight:700;color:#fff;border-left:3px solid #2563eb;padding-left:10px;margin-bottom:18px}
    .subtitle{font-size:13px;color:#a0aec0;margin-bottom:12px}
    .form{display:grid;gap:12px}
    .label{font-size:13px;color:#a0aec0;margin-bottom:6px;display:block}
    .input,select{width:100%;background:#1a2347;color:#fff;border:1px solid #1e2d5a;border-radius:6px;padding:10px 12px;font-size:14px;outline:none}
    .input:focus,select:focus{border-color:#2563eb}
    .btn-row{display:flex;gap:10px;margin-top:2px}
    .btn{padding:8px 20px;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600;border:1px solid transparent}
    .btn-primary{background:#2563eb;color:#fff;border-color:#2563eb}
    .btn-primary:hover{background:#3b82f6}
    .btn-outline{background:transparent;color:#a0aec0;border-color:#1e2d5a}
    .btn-outline:hover{color:#fff}

    .divider{height:1px;background:#1e2d5a;margin:20px 0}
    .table-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:13px}
    thead th{padding:10px 8px;color:#a0aec0;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #1e2d5a}
    tbody tr{border-bottom:1px dashed #1e2d5a}
    tbody td{padding:10px 8px;color:#fff;vertical-align:top}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:15px}
    .edit{color:#2563eb}
    .delete{color:#ef4444}

    @media (max-width:768px){.navbar{padding:0 16px}.nav-links{gap:14px}.main{padding:20px 16px;grid-template-columns:1fr}}
  </style>
  <link rel="stylesheet" href="/css/ui.css" />
</head>
<body>
  <nav class="navbar">
    <ul class="nav-links">
      <li><a href="/pages/dashboard.html">Dashboard</a></li>
      <li>
        <button class="nav-btn" data-dropdown="opsDropdown">Operations <span class="arrow">▾</span></button>
        <div class="dropdown" id="opsDropdown">
          <a href="/pages/receipts.html">Receipts</a>
          <a href="/pages/deliveries.html">Deliveries</a>
        </div>
      </li>
      <li><a href="/pages/stock.html">Stock</a></li>
      <li><a href="/pages/history.html">Move History</a></li>
      <li class="active">
        <button class="nav-btn" data-dropdown="settingsDropdown">Settings <span class="arrow">▾</span></button>
        <div class="dropdown" id="settingsDropdown">
          <a href="/pages/warehouse.html">Warehouse</a>
          <a href="/pages/locations.html">Locations</a>
        </div>
      </li>
    </ul>
    <div class="nav-right">
      <span class="nav-title">Settings</span>
      <button class="avatar" id="avatarBtn">A</button>
      <div class="avatar-menu" id="avatarMenu">
        <a href="#">My Profile</a>
        <button id="logoutBtn">Logout</button>
      </div>
    </div>
  </nav>

  <main class="main">
    <section class="card">
      <h2 class="title">Warehouse</h2>
      <form id="warehouseForm" class="form">
        <div>
          <label class="label" for="whName">Name</label>
          <input class="input" id="whName" placeholder="Warehouse name" required />
        </div>
        <div>
          <label class="label" for="whCode">Short Code</label>
          <input class="input" id="whCode" maxlength="5" placeholder="e.g. WH, MW" required />
        </div>
        <div>
          <label class="label" for="whAddress">Address</label>
          <input class="input" id="whAddress" placeholder="Full address" required />
        </div>
        <div class="btn-row">
          <button id="whSave" type="submit" class="btn btn-primary">Save</button>
          <button id="whCancel" type="button" class="btn btn-outline">Cancel</button>
        </div>
      </form>

      <div class="divider"></div>
      <p class="subtitle">Existing Warehouses</p>
      <div id="warehouseList" class="table-wrap"></div>
    </section>

    <section class="card">
      <h2 class="title">Location</h2>
      <p class="subtitle">Holds rooms, racks, floors etc.</p>
      <form id="locationForm" class="form">
        <div>
          <label class="label" for="locName">Name</label>
          <input class="input" id="locName" placeholder="e.g. Rack A" required />
        </div>
        <div>
          <label class="label" for="locCode">Short Code</label>
          <input class="input" id="locCode" maxlength="8" placeholder="e.g. RACK-A" required />
        </div>
        <div>
          <label class="label" for="locWarehouse">Warehouse</label>
          <select id="locWarehouse" required>
            <option value="">-- Select Warehouse --</option>
          </select>
        </div>
        <div class="btn-row">
          <button id="locSave" type="submit" class="btn btn-primary">Save</button>
          <button id="locCancel" type="button" class="btn btn-outline">Cancel</button>
        </div>
      </form>

      <div class="divider"></div>
      <p class="subtitle">Existing Locations</p>
      <div id="locationList" class="table-wrap"></div>
    </section>
  </main>

  <script src="/js/config.js"></script>
  <script>
    let token = localStorage.getItem('token');
    if (!token) {
      const isLocalHost = location.hostname === '127.0.0.1' || location.hostname === 'localhost';
      if (isLocalHost) {
        localStorage.setItem('token', 'demo-token');
        if (!localStorage.getItem('user_name')) localStorage.setItem('user_name', 'Admin');
        token = localStorage.getItem('token');
      } else {
        location.replace('/index.html');
      }
    }
    const userName = localStorage.getItem('user_name') || 'Admin';
    document.getElementById('avatarBtn').textContent = userName.charAt(0).toUpperCase();

    const avatarBtn = document.getElementById('avatarBtn');
    const avatarMenu = document.getElementById('avatarMenu');
    avatarBtn.addEventListener('click', (e) => { e.stopPropagation(); avatarMenu.classList.toggle('open'); });
    document.addEventListener('click', () => avatarMenu.classList.remove('open'));
    document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.clear(); location.replace('/index.html'); });

    document.querySelectorAll('.nav-btn[data-dropdown]').forEach((btn) => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const li = btn.closest('li');
        const open = li.classList.contains('open');
        document.querySelectorAll('.nav-links li.open').forEach((item) => item.classList.remove('open'));
        if (!open) li.classList.add('open');
      });
    });
    document.addEventListener('click', () => document.querySelectorAll('.nav-links li.open').forEach((item) => item.classList.remove('open')));

    let warehouses = [];
    let locations = [];
    let editWarehouseId = null;
    let editLocationId = null;

    const whName = document.getElementById('whName');
    const whCode = document.getElementById('whCode');
    const whAddress = document.getElementById('whAddress');

    const locName = document.getElementById('locName');
    const locCode = document.getElementById('locCode');
    const locWarehouse = document.getElementById('locWarehouse');

    function renderWarehouseSelect() {
      const selected = locWarehouse.value;
      locWarehouse.innerHTML = '<option value="">-- Select Warehouse --</option>';
      warehouses.forEach((w) => {
        const opt = document.createElement('option');
        opt.value = String(w.id);
        opt.textContent = `${w.name} (${w.short_code})`;
        locWarehouse.appendChild(opt);
      });
      if ([...locWarehouse.options].some((o) => o.value === selected)) locWarehouse.value = selected;
    }

    function renderWarehouseList() {
      const container = document.getElementById('warehouseList');
      container.innerHTML = `
        <table>
          <thead><tr><th>Name</th><th>Short Code</th><th>Address</th><th>Edit</th><th>Delete</th></tr></thead>
          <tbody>
            ${warehouses.map((w) => `
              <tr>
                <td>${w.name}</td><td>${w.short_code}</td><td>${w.address}</td>
                <td><button class="icon-btn edit" data-wh-edit="${w.id}">✏️</button></td>
                <td><button class="icon-btn delete" data-wh-del="${w.id}">🗑</button></td>
              </tr>
            `).join('') || '<tr><td colspan="5" style="color:#a0aec0">No warehouses yet</td></tr>'}
          </tbody>
        </table>
      `;
      renderWarehouseSelect();
    }

    function renderLocationList() {
      const container = document.getElementById('locationList');
      container.innerHTML = `
        <table>
          <thead><tr><th>Name</th><th>Short Code</th><th>Warehouse</th><th>Edit</th><th>Delete</th></tr></thead>
          <tbody>
            ${locations.map((l) => `
              <tr>
                <td>${l.name}</td><td>${l.short_code}</td><td>${l.warehouse_name}</td>
                <td><button class="icon-btn edit" data-loc-edit="${l.id}">✏️</button></td>
                <td><button class="icon-btn delete" data-loc-del="${l.id}">🗑</button></td>
              </tr>
            `).join('') || '<tr><td colspan="5" style="color:#a0aec0">No locations yet</td></tr>'}
          </tbody>
        </table>
      `;
    }

    function resetWarehouseForm() {
      editWarehouseId = null;
      document.getElementById('warehouseForm').reset();
      whCode.maxLength = 5;
    }

    function resetLocationForm() {
      editLocationId = null;
      document.getElementById('locationForm').reset();
      locCode.maxLength = 8;
    }

    document.getElementById('warehouseForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = { name: whName.value.trim(), short_code: whCode.value.trim(), address: whAddress.value.trim() };
      try {
        if (editWarehouseId) {
          const res = await fetch(apiUrl(`/api/warehouses/${editWarehouseId}`), { method: 'PUT', headers: { 'Content-Type':'application/json', Authorization:'Bearer '+token }, body: JSON.stringify(payload) });
          if (!res.ok) throw new Error();
        } else {
          const res = await fetch(apiUrl('/api/warehouses'), { method: 'POST', headers: { 'Content-Type':'application/json', Authorization:'Bearer '+token }, body: JSON.stringify(payload) });
          if (!res.ok) throw new Error();
        }
        await loadWarehouses();
        resetWarehouseForm();
      } catch {
        if (editWarehouseId) {
          warehouses = warehouses.map((w) => (w.id === editWarehouseId ? { ...w, ...payload } : w));
        } else {
          warehouses.push({ id: Date.now(), ...payload });
        }
        renderWarehouseList();
        resetWarehouseForm();
      }
    });

    document.getElementById('locationForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const wid = Number(locWarehouse.value);
      const wh = warehouses.find((w) => w.id === wid);
      const payload = { name: locName.value.trim(), short_code: locCode.value.trim(), warehouse_id: wid };
      try {
        if (editLocationId) {
          const res = await fetch(apiUrl(`/api/locations/${editLocationId}`), { method: 'PUT', headers: { 'Content-Type':'application/json', Authorization:'Bearer '+token }, body: JSON.stringify(payload) });
          if (!res.ok) throw new Error();
        } else {
          const res = await fetch(apiUrl('/api/locations'), { method: 'POST', headers: { 'Content-Type':'application/json', Authorization:'Bearer '+token }, body: JSON.stringify(payload) });
          if (!res.ok) throw new Error();
        }
        await loadLocations();
        resetLocationForm();
      } catch {
        const mapped = { id: editLocationId || Date.now(), ...payload, warehouse_name: wh ? wh.name : 'Unknown' };
        if (editLocationId) locations = locations.map((l) => (l.id === editLocationId ? mapped : l));
        else locations.push(mapped);
        renderLocationList();
        resetLocationForm();
      }
    });

    document.getElementById('whCancel').addEventListener('click', resetWarehouseForm);
    document.getElementById('locCancel').addEventListener('click', resetLocationForm);

    document.addEventListener('click', async (e) => {
      const editW = e.target.closest('[data-wh-edit]');
      const delW = e.target.closest('[data-wh-del]');
      const editL = e.target.closest('[data-loc-edit]');
      const delL = e.target.closest('[data-loc-del]');

      if (editW) {
        const id = Number(editW.dataset.whEdit);
        const row = warehouses.find((w) => w.id === id);
        if (!row) return;
        editWarehouseId = id;
        whName.value = row.name;
        whCode.value = row.short_code;
        whAddress.value = row.address;
      }

      if (delW) {
        const id = Number(delW.dataset.whDel);
        if (!confirm('Delete this warehouse?')) return;
        try { await fetch(apiUrl(`/api/warehouses/${id}`), { method: 'DELETE', headers: { Authorization: 'Bearer '+token } }); } catch {}
        warehouses = warehouses.filter((w) => w.id !== id);
        locations = locations.filter((l) => l.warehouse_id !== id);
        renderWarehouseList();
        renderLocationList();
      }

      if (editL) {
        const id = Number(editL.dataset.locEdit);
        const row = locations.find((l) => l.id === id);
        if (!row) return;
        editLocationId = id;
        locName.value = row.name;
        locCode.value = row.short_code;
        locWarehouse.value = String(row.warehouse_id);
      }

      if (delL) {
        const id = Number(delL.dataset.locDel);
        if (!confirm('Delete this location?')) return;
        try { await fetch(apiUrl(`/api/locations/${id}`), { method: 'DELETE', headers: { Authorization:'Bearer '+token } }); } catch {}
        locations = locations.filter((l) => l.id !== id);
        renderLocationList();
      }
    });

    async function loadWarehouses() {
      try {
        const res = await fetch(apiUrl('/api/warehouses'), { headers: { Authorization: 'Bearer '+token } });
        if (!res.ok) throw new Error();
        warehouses = await res.json();
      } catch {
        warehouses = [{ id: 1, name: 'Main Warehouse', short_code: 'WH', address: 'Industrial Area' }];
      }
      renderWarehouseList();
    }

    async function loadLocations() {
      try {
        const res = await fetch(apiUrl('/api/locations'), { headers: { Authorization: 'Bearer '+token } });
        if (!res.ok) throw new Error();
        const data = await res.json();
        locations = data.map((l) => ({
          ...l,
          warehouse_name: l.warehouse_name || warehouses.find((w) => w.id === l.warehouse_id)?.name || 'Unknown'
        }));
      } catch {
        locations = [{ id: 1, name: 'Rack A', short_code: 'RACK-A', warehouse_id: 1, warehouse_name: 'Main Warehouse' }];
      }
      renderLocationList();
    }

    (async () => { await loadWarehouses(); await loadLocations(); })();
  </script>
  <script src="/js/ui.js"></script>
</body>
</html>
