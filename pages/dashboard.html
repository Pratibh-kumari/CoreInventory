<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoreInventory — Dashboard</title>
  <link rel="stylesheet" href="/css/ui.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
    .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .kpi-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 24px; cursor: pointer; transition: border-color 0.2s, box-shadow 0.2s, transform 0.18s; text-decoration: none; display: block; color: inherit; }
    .kpi-card:hover { border-color: var(--accent); box-shadow: 0 4px 24px rgba(37,99,235,0.15); transform: translateY(-2px); }
    .kpi-card-header { font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 16px; }
    .kpi-card-body { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .kpi-badge { background: rgba(37,99,235,0.15); color: var(--accent-h); border: 1px solid var(--accent); border-radius: 20px; padding: 6px 16px; font-size: 13px; font-weight: 600; white-space: nowrap; display: inline-block; margin-top: 8px; }
    .kpi-num { font-size: 32px; font-weight: 700; color: var(--accent); display: block; line-height: 1; }
    .kpi-stats { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; text-align: right; }
    .kpi-stat { font-size: 13px; }
    .stat-late { color: var(--danger); }
    .stat-muted { color: var(--text-muted); }
    .stat-waiting { color: var(--warning); }
    .skeleton { background: var(--bg-surface); border-radius: 10px; border: 1px solid var(--border); padding: 24px; overflow: hidden; position: relative; }
    .skeleton::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.04) 50%, transparent 100%); animation: shimmer 1.4s infinite; }
    @keyframes shimmer { from { transform: translateX(-100%); } to { transform: translateX(100%); } }
    .skeleton-line { height: 14px; background: #2a3660; border-radius: 6px; margin-bottom: 12px; }
    .skeleton-line.wide { width: 60%; }
    .skeleton-line.short { width: 35%; }
    .skeleton-line.full { width: 100%; }
    .page-heading { font-size: 28px; font-weight: 600; margin-bottom: 6px; }
    .page-subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }
    @media (max-width: 768px) { .kpi-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main class="ci-main">
    <h1 class="page-heading">Dashboard</h1>
    <p class="page-subtitle">Current inventory statistics</p>
    <div class="kpi-grid" id="kpiGrid">
      <div class="skeleton"><div class="skeleton-line wide"></div><div class="skeleton-line short"></div><div class="skeleton-line full"></div></div>
      <div class="skeleton"><div class="skeleton-line wide"></div><div class="skeleton-line short"></div><div class="skeleton-line full"></div></div>
    </div>
  </main>
  <script src="/js/config.js"></script>
  <script src="/js/ui.js"></script>
  <script>
    let token = localStorage.getItem('token');
    if (!token) {
      const isLocal = location.hostname === '127.0.0.1' || location.hostname === 'localhost';
      if (isLocal) {
        localStorage.setItem('token', 'demo-token');
        if (!localStorage.getItem('user_name')) localStorage.setItem('user_name', 'Admin');
        token = 'demo-token';
      } else {
        location.replace('/index.html');
      }
    }
    ciInit('dashboard');
    function renderKPI(data) {
      const pr = data.pendingReceipts ?? 4;
      const lr = data.lateReceipts ?? 1;
      const tor = data.totalReceiptOps ?? 6;
      const pd = data.pendingDeliveries ?? 4;
      const ld = data.lateDeliveries ?? 1;
      const wd = data.waitingDeliveries ?? 2;
      const tod = data.totalDeliveryOps ?? 6;
      document.getElementById('kpiGrid').innerHTML = `
          <div class="kpi-card-header">Receipt</div>
          <div class="kpi-card-body">
            <span class="kpi-badge">${data.pendingReceipts ?? 4} to receive</span>
            <div class="kpi-stats">
              <span class="kpi-stat stat-late">${data.lateReceipts ?? 1} Late</span>
              <span class="kpi-stat stat-muted">${data.totalReceiptOps ?? 6} operations</span>
            </div>
          </div>
        </a>

        <a class="kpi-card" href="/pages/deliveries.html">
          <div class="kpi-card-header">Delivery</div>
          <div class="kpi-card-body">
            <span class="kpi-badge">${data.pendingDeliveries ?? 4} to Deliver</span>
            <div class="kpi-stats">
              <span class="kpi-stat stat-late">${data.lateDeliveries ?? 1} Late</span>
              <span class="kpi-stat stat-waiting">${data.waitingDeliveries ?? 2} waiting</span>
              <span class="kpi-stat stat-muted">${data.totalDeliveryOps ?? 6} operations</span>
            </div>
          </div>
        </a>
      `;
    }

    /* ── Fetch dashboard data ── */
    (async () => {
      try {
        const res = await fetch(apiUrl('/api/dashboard'), {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!res.ok) throw new Error('Failed to load');
        const data = await res.json();
        renderKPI(data);
      } catch {
        /* API not ready yet — render with fallback values */
        renderKPI({});
      }
    })();
  </script>

</body>
</html>
