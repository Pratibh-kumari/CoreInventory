<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoreInventory — Receipts</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:#0a0f2e;color:#fff;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}

    .navbar{position:fixed;top:0;left:0;right:0;height:56px;background:#111936;border-bottom:1px solid #1e2d5a;display:flex;align-items:center;justify-content:space-between;padding:0 32px;z-index:1000}
    .nav-links{display:flex;align-items:center;gap:28px;list-style:none}
    .nav-links li{position:relative}
    .nav-links a,.nav-links .nav-btn{background:none;border:none;height:56px;display:flex;align-items:center;gap:4px;color:#a0aec0;text-decoration:none;cursor:pointer;font-size:14px;font-family:inherit;border-bottom:2px solid transparent;transition:.15s}
    .nav-links a:hover,.nav-links .nav-btn:hover{color:#fff}
    .nav-links li.active>a,.nav-links li.active>.nav-btn{color:#fff;border-bottom-color:#2563eb}
    .arrow{font-size:10px;opacity:.7;transition:transform .2s}
    .nav-links li:hover .arrow,.nav-links li.open .arrow{transform:rotate(180deg)}
    .dropdown{display:none;position:absolute;left:0;top:calc(100% + 1px);min-width:160px;background:#1a2347;border:1px solid #1e2d5a;border-radius:8px;padding:8px 0;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:200}
    .nav-links li:hover .dropdown,.nav-links li.open .dropdown{display:block}
    .dropdown a{display:block;padding:10px 16px;color:#a0aec0;text-decoration:none;font-size:13px}
    .dropdown a:hover{background:#2563eb;color:#fff}
    .nav-right{display:flex;align-items:center;gap:12px;position:relative}
    .nav-title{font-size:15px;font-weight:700}
    .avatar{width:34px;height:34px;border-radius:50%;border:0;background:#2563eb;color:#fff;font-size:13px;font-weight:700;cursor:pointer}
    .avatar-menu{display:none;position:absolute;right:0;top:calc(100% + 10px);min-width:150px;background:#1a2347;border:1px solid #1e2d5a;border-radius:8px;padding:8px 0;z-index:300}
    .avatar-menu.open{display:block}
    .avatar-menu a,.avatar-menu button{display:block;width:100%;padding:10px 16px;color:#a0aec0;background:none;border:none;text-decoration:none;text-align:left;cursor:pointer;font-size:13px}
    .avatar-menu a:hover,.avatar-menu button:hover{background:#2563eb;color:#fff}

    .main{margin-top:56px;padding:32px;position:relative}
    .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
    .header-left{display:flex;align-items:center;gap:16px}
    .new-btn{border:1px solid #1e2d5a;background:transparent;color:#fff;border-radius:6px;padding:6px 16px;cursor:pointer}
    .title{font-size:24px;font-weight:700}
    .header-right{display:flex;align-items:center;gap:8px}
    .icon-btn{width:32px;height:32px;border-radius:50%;border:none;background:#1a2347;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .icon-btn:hover{background:#2563eb}

    .search{position:absolute;right:32px;top:84px;width:240px;background:#1a2347;color:#fff;border:1px solid #2563eb;border-radius:6px;padding:8px 12px;opacity:0;transform:translateY(-8px);pointer-events:none;transition:opacity .2s,transform .2s}
    .search.show{opacity:1;transform:translateY(0);pointer-events:auto}
    .search::placeholder{color:#4a5568}

    .table-wrap{background:#111936;border:1px solid #1e2d5a;border-radius:10px;overflow:hidden}
    table{width:100%;border-collapse:collapse}
    thead th{background:#1a2347;padding:12px 16px;color:#a0aec0;font-size:12px;letter-spacing:.05em;text-transform:uppercase;text-align:left;border-bottom:1px solid #1e2d5a}
    tbody tr{border-bottom:1px dashed #1e2d5a;cursor:pointer}
    tbody tr:hover{background:#1a2347}
    tbody td{padding:12px 16px;font-size:13px;color:#fff}
    .ref{font-family:monospace;font-weight:600;color:#3b82f6}

    .status{padding:3px 10px;border-radius:20px;font-size:11px;display:inline-block}
    .st-draft{background:#4a5568;color:#fff}
    .st-ready{background:#f59e0b;color:#1a1a1a}
    .st-done{background:#10b981;color:#fff}
    .st-waiting{background:#2563eb;color:#fff}

    .skeleton{padding:0 16px}
    .sk-row{height:46px;display:flex;align-items:center;border-bottom:1px dashed #1e2d5a}
    .sk-bar{height:12px;border-radius:8px;background:#2a3660;position:relative;overflow:hidden}
    .sk-bar::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);animation:shimmer 1.2s infinite}
    .w1{width:20%}.w2{width:14%;margin-left:7%}.w3{width:16%;margin-left:8%}.w4{width:12%;margin-left:8%}
    @keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}

    .empty{display:none;color:#a0aec0;text-align:center;padding:40px}

    .detail-view{display:none}
    .back-link{color:#a0aec0;cursor:pointer;font-size:14px;margin-bottom:18px;display:inline-block}
    .back-link:hover{color:#fff}

    .detail-top{display:flex;align-items:center;justify-content:space-between;gap:20px;margin-bottom:20px;flex-wrap:wrap}
    .btn-row{display:flex;gap:10px}
    .btn{border:1px solid #1e2d5a;border-radius:6px;padding:8px 20px;font-size:13px;cursor:pointer;font-weight:600}
    .btn-primary{background:#2563eb;color:#fff;border-color:#2563eb}
    .btn-primary:hover{background:#3b82f6}
    .btn-outline{background:transparent;color:#a0aec0}
    .btn-outline:hover{color:#fff}
    #printBtn{display:none}

    .flow{display:flex;gap:8px;align-items:center}
    .flow-pill{padding:4px 12px;border-radius:999px;border:1px solid #1e2d5a;color:#a0aec0;font-size:12px}
    .flow-pill.active{background:#2563eb;border-color:#2563eb;color:#fff}

    .doc-ref{font-size:22px;color:#fff;font-weight:700;font-family:monospace;margin-bottom:18px}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px 20px;margin-bottom:18px}
    .label{display:block;font-size:12px;color:#a0aec0;margin-bottom:6px}
    .input,.select{width:100%;background:#1a2347;color:#fff;border:1px solid #1e2d5a;border-radius:6px;padding:10px 12px;font-size:14px;outline:none}
    .input:focus,.select:focus{border-color:#2563eb}

    .products{background:#111936;border:1px solid #1e2d5a;border-radius:10px;padding:16px}
    .products h3{font-size:14px;font-weight:600;margin-bottom:10px}
    .separator{height:1px;background:#1e2d5a;margin-bottom:10px}
    #productsTable th{background:transparent;padding:10px 8px;font-size:12px;text-transform:uppercase;color:#a0aec0;border-bottom:1px solid #1e2d5a}
    #productsTable td{padding:10px 8px;border-bottom:1px dashed #1e2d5a}
    .add-product{margin-top:10px;color:#3b82f6;cursor:pointer;font-size:13px;display:inline-block}
    .add-product:hover{text-decoration:underline}

    @media (max-width:768px){.navbar{padding:0 16px}.nav-links{gap:14px}.main{padding:20px 16px}.search{right:16px;top:76px;width:200px}.form-grid{grid-template-columns:1fr}}
  </style>
  <link rel="stylesheet" href="/css/ui.css" />
</head>
<body>
  <nav class="navbar">
    <ul class="nav-links">
      <li><a href="/pages/dashboard.html">Dashboard</a></li>
      <li class="active">
        <button class="nav-btn" data-dropdown="opsDropdown">Operations <span class="arrow">▾</span></button>
        <div class="dropdown" id="opsDropdown"><a href="/pages/receipts.html">Receipts</a><a href="/pages/deliveries.html">Deliveries</a></div>
      </li>
      <li><a href="/pages/stock.html">Stock</a></li>
      <li><a href="/pages/history.html">Move History</a></li>
      <li>
        <button class="nav-btn" data-dropdown="settingsDropdown">Settings <span class="arrow">▾</span></button>
        <div class="dropdown" id="settingsDropdown"><a href="/pages/warehouse.html">Warehouse</a><a href="/pages/locations.html">Locations</a></div>
      </li>
    </ul>
    <div class="nav-right">
      <span class="nav-title">Receipts</span>
      <button class="avatar" id="avatarBtn">A</button>
      <div class="avatar-menu" id="avatarMenu"><a href="#">My Profile</a><button id="logoutBtn">Logout</button></div>
    </div>
  </nav>

  <main class="main">
    <section id="listView" class="list-view">
      <div class="header">
        <div class="header-left">
          <button class="new-btn" id="newBtn">NEW</button>
          <h1 class="title">Receipts</h1>
        </div>
        <div class="header-right">
          <button class="icon-btn" id="toggleSearch">🔍</button>
          <button class="icon-btn" title="List view">☰</button>
          <button class="icon-btn" title="Kanban view">▦</button>
        </div>
      </div>

      <input id="receiptSearch" class="search" placeholder="Search by reference/contact" />

      <div class="table-wrap">
        <div id="receiptSkeleton" class="skeleton">
          <div class="sk-row"><div class="sk-bar w1"></div><div class="sk-bar w2"></div><div class="sk-bar w3"></div><div class="sk-bar w4"></div></div>
          <div class="sk-row"><div class="sk-bar w1"></div><div class="sk-bar w2"></div><div class="sk-bar w3"></div><div class="sk-bar w4"></div></div>
          <div class="sk-row"><div class="sk-bar w1"></div><div class="sk-bar w2"></div><div class="sk-bar w3"></div><div class="sk-bar w4"></div></div>
        </div>
        <table id="receiptTable" style="display:none">
          <thead><tr><th>Reference</th><th>From</th><th>To</th><th>Contact</th><th>Schedule Date</th><th>Status</th></tr></thead>
          <tbody id="receiptBody"></tbody>
        </table>
        <div id="receiptEmpty" class="empty">No receipts found</div>
      </div>
    </section>

    <section id="detailView" class="detail-view">
      <span id="backToList" class="back-link">← Back to Receipts</span>

      <div class="detail-top">
        <div class="btn-row">
          <button id="validateBtn" class="btn btn-primary">Validate</button>
          <button id="printBtn" class="btn btn-outline">Print</button>
          <button id="cancelBtn" class="btn btn-outline">Cancel</button>
        </div>

        <div class="flow" id="statusFlow">
          <span class="flow-pill" data-step="Draft">Draft</span>
          <span class="flow-pill" data-step="Ready">Ready</span>
          <span class="flow-pill" data-step="Done">Done</span>
        </div>
      </div>

      <h2 id="receiptRef" class="doc-ref">WH/IN/0001</h2>

      <div class="form-grid">
        <div>
          <label class="label" for="receiveFrom">Receive From</label>
          <input id="receiveFrom" class="input" placeholder="Vendor" />
        </div>
        <div>
          <label class="label" for="scheduleDate">Schedule Date</label>
          <input id="scheduleDate" class="input" type="date" />
        </div>
        <div>
          <label class="label" for="responsible">Responsible</label>
          <input id="responsible" class="input" />
        </div>
      </div>

      <section class="products">
        <h3>Products</h3>
        <div class="separator"></div>
        <table id="productsTable">
          <thead><tr><th>Product</th><th>Quantity</th></tr></thead>
          <tbody id="productsBody"></tbody>
        </table>
        <span id="addProductRow" class="add-product">New Product</span>
      </section>
    </section>
  </main>

  <script src="/js/config.js"></script>
  <script>
    function requireAuth(){
      let token = localStorage.getItem('token');
      if (!token) {
        const isLocalHost = location.hostname === '127.0.0.1' || location.hostname === 'localhost';
        if (isLocalHost) {
          localStorage.setItem('token', 'demo-token');
          if (!localStorage.getItem('user_name')) localStorage.setItem('user_name', 'Admin');
          token = localStorage.getItem('token');
        } else {
          location.replace('/index.html');
        }
      }
      return token;
    }
    const token = requireAuth();

    const userName = localStorage.getItem('user_name') || 'Admin';
    document.getElementById('avatarBtn').textContent = userName.charAt(0).toUpperCase();
    document.getElementById('responsible').value = userName;

    const avatarBtn = document.getElementById('avatarBtn');
    const avatarMenu = document.getElementById('avatarMenu');
    avatarBtn.addEventListener('click',(e)=>{e.stopPropagation();avatarMenu.classList.toggle('open')});
    document.addEventListener('click',()=>avatarMenu.classList.remove('open'));
    document.getElementById('logoutBtn').addEventListener('click',()=>{localStorage.clear();location.replace('/index.html')});

    document.querySelectorAll('.nav-btn[data-dropdown]').forEach((btn)=>{
      btn.addEventListener('click',(e)=>{
        e.stopPropagation();
        const li=btn.closest('li');
        const open=li.classList.contains('open');
        document.querySelectorAll('.nav-links li.open').forEach((item)=>item.classList.remove('open'));
        if(!open) li.classList.add('open');
      });
    });
    document.addEventListener('click',()=>document.querySelectorAll('.nav-links li.open').forEach((item)=>item.classList.remove('open')));

    const listView = document.getElementById('listView');
    const detailView = document.getElementById('detailView');
    const searchInput = document.getElementById('receiptSearch');
    const receiptBody = document.getElementById('receiptBody');
    const receiptTable = document.getElementById('receiptTable');
    const receiptEmpty = document.getElementById('receiptEmpty');
    const receiptRef = document.getElementById('receiptRef');
    const productsBody = document.getElementById('productsBody');

    let receipts = [];
    let currentReceipt = null;

    function formatDate(value){
      if(!value) return '';
      const d = new Date(value);
      if(Number.isNaN(d.getTime())) return '';
      const dd=String(d.getDate()).padStart(2,'0');
      const mm=String(d.getMonth()+1).padStart(2,'0');
      const yy=d.getFullYear();
      return `${dd}/${mm}/${yy}`;
    }

    function statusClass(status){
      const s = String(status||'Draft').toLowerCase();
      if(s==='ready') return 'st-ready';
      if(s==='done') return 'st-done';
      if(s==='waiting') return 'st-waiting';
      return 'st-draft';
    }

    function renderList(rows){
      receiptBody.innerHTML = '';
      if(!rows.length){
        receiptTable.style.display = 'none';
        receiptEmpty.style.display = 'block';
        return;
      }
      receiptEmpty.style.display = 'none';
      receiptTable.style.display = 'table';

      rows.forEach((r)=>{
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="ref">${r.reference || '-'}</td>
          <td>vendor</td>
          <td>${r.to || '-'}</td>
          <td>${r.contact || '-'}</td>
          <td>${formatDate(r.schedule_date)}</td>
          <td><span class="status ${statusClass(r.status)}">${r.status || 'Draft'}</span></td>
        `;
        tr.addEventListener('click',()=>showDetail(r.id));
        receiptBody.appendChild(tr);
      });
    }

    function applySearch(){
      const q = searchInput.value.trim().toLowerCase();
      if(!q) return renderList(receipts);
      renderList(receipts.filter((r)=>String(r.reference||'').toLowerCase().includes(q)||String(r.contact||'').toLowerCase().includes(q)));
    }

    searchInput.addEventListener('input',applySearch);
    document.getElementById('toggleSearch').addEventListener('click',()=>{
      searchInput.classList.toggle('show');
      if(searchInput.classList.contains('show')) searchInput.focus();
    });

    document.getElementById('newBtn').addEventListener('click',()=>{
      currentReceipt = { id: null, reference: 'WH/IN/0001', from: 'vendor', to: '', contact: '', schedule_date: '', status: 'Draft', items: [] };
      fillDetail(currentReceipt);
      listView.style.display='none';
      detailView.style.display='block';
    });

    document.getElementById('backToList').addEventListener('click',()=>{
      detailView.style.display='none';
      listView.style.display='block';
    });

    function setFlow(status){
      document.querySelectorAll('#statusFlow .flow-pill').forEach((p)=>p.classList.toggle('active', p.dataset.step===status));
      document.getElementById('printBtn').style.display = status === 'Done' ? 'inline-block' : 'none';
    }

    function fillDetail(receipt){
      currentReceipt = receipt;
      receiptRef.textContent = receipt.reference || 'WH/IN/0001';
      document.getElementById('receiveFrom').value = receipt.from || 'vendor';
      document.getElementById('scheduleDate').value = receipt.schedule_date ? new Date(receipt.schedule_date).toISOString().slice(0,10) : '';
      document.getElementById('responsible').value = localStorage.getItem('user_name') || 'Admin';
      setFlow(receipt.status || 'Draft');
      renderProducts(receipt.items || []);
    }

    function renderProducts(items){
      const rows = items.length ? items : [{product:'',qty:1}];
      productsBody.innerHTML = '';
      rows.forEach((it)=>{
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><input class="input" placeholder="[SKU] Product" value="${it.product || it.name || ''}" /></td>
          <td><input class="input" type="number" min="1" value="${it.qty || 1}" /></td>
        `;
        productsBody.appendChild(tr);
      });
    }

    document.getElementById('addProductRow').addEventListener('click',()=>{
      const tr = document.createElement('tr');
      tr.innerHTML = '<td><input class="input" placeholder="[SKU] Product" /></td><td><input class="input" type="number" min="1" value="1" /></td>';
      productsBody.appendChild(tr);
    });

    document.getElementById('cancelBtn').addEventListener('click',()=>{
      detailView.style.display='none';
      listView.style.display='block';
    });

    document.getElementById('validateBtn').addEventListener('click',async()=>{
      if(!currentReceipt?.id){ setFlow('Ready'); return; }
      try{
        const res = await fetch(apiUrl(`/api/receipts/${currentReceipt.id}/validate`),{method:'POST',headers:{Authorization:'Bearer '+token}});
        if(!res.ok) throw new Error();
        const data = await res.json();
        currentReceipt.status = data.status || (currentReceipt.status==='Draft'?'Ready':'Done');
      }catch{
        currentReceipt.status = currentReceipt.status==='Draft'?'Ready':'Done';
      }
      setFlow(currentReceipt.status);
      await loadReceipts();
    });

    function showDetail(id){
      const receipt = receipts.find((r)=>r.id===id);
      if(!receipt) return;
      fillDetail(receipt);
      listView.style.display='none';
      detailView.style.display='block';
    }

    async function loadReceipts(){
      document.getElementById('receiptSkeleton').style.display='block';
      try{
        const res = await fetch(apiUrl('/api/receipts'),{headers:{Authorization:'Bearer '+token}});
        if(!res.ok) throw new Error();
        receipts = await res.json();
      }catch{
        receipts = [
          { id:1, reference:'WH/IN/0001', from:'vendor', to:'WH/Stock1', contact:'ABC Vendor', schedule_date:'2026-03-16', status:'Draft', items:[{product:'[DESK001] Desk', qty:10}] },
          { id:2, reference:'WH/IN/0002', from:'vendor', to:'WH/Stock2', contact:'Office Mart', schedule_date:'2026-03-18', status:'Ready', items:[{product:'[CHR008] Chair', qty:5}] }
        ];
      }finally{
        document.getElementById('receiptSkeleton').style.display='none';
        renderList(receipts);
      }
    }

    const params = new URLSearchParams(location.search);
    if(params.get('new') === 'true') document.getElementById('newBtn').click();

    loadReceipts();
  </script>
  <script src="/js/ui.js"></script>
</body>
</html>
